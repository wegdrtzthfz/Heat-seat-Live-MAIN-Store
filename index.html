<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heat & Seat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0f1a;
--card:#121826;
--accent:linear-gradient(135deg,#22c55e,#9333ea);
}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
flex-direction:column;
}
.top{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
}
h1{
font-size:28px;
background:var(--accent);
-webkit-background-clip:text;
color:transparent;
margin:5px 0;
}
.time{
font-size:12px;
opacity:0.7;
}

/* MENU */
.menu{cursor:pointer;font-size:20px}

/* TAGLINE */
.tagline{text-align:center;font-size:14px;opacity:.8}
.fade{transition:.5s}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}
.card{
background:var(--card);
border-radius:20px;
padding:10px;
}
.card img{width:100%;border-radius:15px}
.add{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
}

/* CART BTN */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--accent);
padding:15px;
border-radius:50%;
cursor:pointer;
}
.count{
position:absolute;
top:-5px;
right:-5px;
background:red;
padding:3px 7px;
border-radius:50%;
font-size:12px;
}

/* CART */
.cart{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:85%;
background:var(--card);
border-radius:20px 20px 0 0;
transition:.4s;
padding:15px;
overflow:auto;
}
.cart.active{bottom:0}

/* FORM */
input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
}

/* HELP PAGE */
.page{
position:fixed;
left:100%;
top:0;
width:100%;
height:100%;
background:var(--bg);
transition:.4s;
padding:20px;
}
.page.active{left:0}

/* SUCCESS */
.success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:#000c;
font-size:22px;
}
</style>
</head>

<body>

<header>
<div class="top">
<div class="menu" onclick="openHelp()">⋮</div>
<div class="time" id="time"></div>
</div>
<h1>Heat & Seat</h1>
<div class="tagline">Experience <span id="word">Cool</span></div>
</header>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒<div class="count" id="count">0</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<div style="display:flex;justify-content:space-between">
<div onclick="toggleCart()">⬅ Back</div>
<div onclick="location.reload()">🏠 Home</div>
</div>

<h2>Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total"></span></h3>

<form id="form" action="https://formspree.io/f/xjgprogr" method="POST">

<input name="name" required placeholder="Full Name">
<input name="contact" required placeholder="Phone / Instagram">
<textarea name="address" required placeholder="Address"></textarea>
<input name="time" placeholder="Preferred Time">

<label><input type="checkbox" required> I am above 18</label>

<input type="hidden" name="order_details" id="orderData">

<button>Place Order</button>
</form>
</div>

<!-- HELP -->
<div class="page" id="help">
<div style="display:flex;justify-content:space-between">
<div onclick="closeHelp()">⬅ Back</div>
<div onclick="location.reload()">🏠 Home</div>
</div>

<h2>Help</h2>
<p onclick="window.open('https://wa.me/916201276342')">📱 WhatsApp</p>
<p onclick="window.open('https://instagram.com/Logan_cuban')">📸 Logan_cuban</p>
</div>

<div class="success" id="success">🎉 Order Placed!</div>

<script>

/* LIVE TIME */
setInterval(()=>{
let d=new Date();
document.getElementById("time").innerText=
d.toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* WORD ANIMATION */
const words=["Cool","Hell YEhhh!!","CrazYYY!!","FuNN!!","NuT Breaker@#$","Concole !@#$"];
let i=0;
setInterval(()=>{
let w=document.getElementById("word");
w.style.opacity=0;
setTimeout(()=>{
i=(i+1)%words.length;
w.innerText=words[i];
w.style.opacity=1;
},500);
},2000);

/* PRODUCTS */
const products=[
{name:"Heeat (3g)",price:50,img:"https://i.ibb.co/hR2T56cx/50rs-Pudiya.jpg"},
{name:"Hoiunt Roll",price:30,img:"https://i.ibb.co/dw7gZ1MH/Joint.jpg"},
{name:"GovindPur Heeat",price:600,img:"https://i.ibb.co/tTt9shS3/Green.jpg"},
{name:"Hybrid Seed",price:80,img:"https://i.ibb.co/qLmTXFDc/Weed-Seed.jpg"},
{name:"Charam (20g)",price:2900,img:"https://i.ibb.co/NgHGpQQr/square-Charas.jpg"},
{name:"Hybred Heat (25g)",price:2000,img:"https://i.ibb.co/KpfDXhYW/square-image.jpg"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button class="add" onclick="add(${i})">Add</button>
</div>`;
});
}

function add(i){
let item=cart.find(c=>c.name===products[i].name);
if(item)item.qty++;
else cart.push({...products[i],qty:1});
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCount();
drawCart();
}

function updateCount(){
document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
drawCart();
}

function drawCart(){
let html="",total=0;
cart.forEach((c,i)=>{
total+=c.price*c.qty;
html+=`${c.name} x${c.qty}<br>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

document.getElementById("form").onsubmit=function(e){

if(cart.length===0){
alert("Cart empty");
e.preventDefault();
return;
}

let total=0,txt="Order ID: "+Date.now()+"\n\n";

cart.forEach(c=>{
let t=c.price*c.qty;
total+=t;
txt+=`${c.name} x${c.qty} = ₹${t}\n`;
});

txt+="\nTotal ₹"+total;

document.getElementById("orderData").value=txt;

setTimeout(()=>{
cart=[];
localStorage.removeItem("cart");
updateCount();
document.getElementById("success").style.display="flex";
setTimeout(()=>location.reload(),2000);
},1000);

};

function openHelp(){
document.getElementById("help").classList.add("active");
}
function closeHelp(){
document.getElementById("help").classList.remove("active");
}

render();
updateCount();
drawCart();

</script>

</body>
</html>
